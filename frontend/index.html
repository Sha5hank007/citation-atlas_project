<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600;1,300&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #faf9f6;
  --surface:   #ffffff;
  --border:    #e8e4dc;
  --border-md: #d4cfc4;
  --text:      #1a1714;
  --text-2:    #5c5750;
  --text-3:    #9c968e;
  --accent:    #2563eb;
  --accent-bg: #eff4ff;
  --green:     #166534;
  --green-bg:  #f0fdf4;
  --amber:     #92400e;
  --mono:      'IBM Plex Mono', monospace;
  --sans:      'IBM Plex Sans', sans-serif;
  --display:   'Fraunces', serif;
}

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── scrollbar ── */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 2px; }

/* ── topbar ── */
#topbar {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 0 20px;
  height: 52px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}

#logo {
  font-family: var(--display);
  font-size: 18px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  letter-spacing: -0.02em;
}
#logo em { font-style: italic; color: var(--accent); }

#topic {
  flex: 1;              
  min-width: 0;        
  height: 36px;
  padding: 0 14px;
  border: 1.5px solid #d4cfc4;
  border-radius: 8px;
  background: #ffffff;
  font-size: 13px;
}

#topic:focus {border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12); background: #ffffff; }
#topic::placeholder { color: var(--text-3); }

#run-btn {
  height: 34px;
  padding: 0 18px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 6px;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.15s;
}
#run-btn:hover:not(:disabled) { background: #1d4ed8; }
#run-btn:disabled { background: var(--border-md); color: var(--text-3); cursor: not-allowed; }

#status {
  font-family: var(--mono);
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 999px;
  background: #eff4ff;
  color: #1d4ed8;
  border: 1px solid #bfdbfe;
  display: none; 
}

/* ── subbar ── */
#subbar {
  flex-shrink: 0;
  height: 38px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 0;
  padding: 0;
}

.subbar-cell {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 16px;
  height: 100%;
  border-right: 1px solid var(--border);
}

.subbar-label {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  white-space: nowrap;
}

#runs {
  height: 24px;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 0 8px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text);
  background: var(--bg);
  outline: none;
  cursor: pointer;
  max-width: 240px;
}

#summary-cell {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 16px;
  overflow: hidden;
}

#summary-content {
  font-size: 12px;
  color: var(--text-2);
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  flex: 1;
  line-height: 1;
}

#summary-toggle {
  flex-shrink: 0;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--accent);
  cursor: pointer;
  white-space: nowrap;
  background: var(--accent-bg);
  border: 1px solid #bfdbfe;
  border-radius: 3px;
  padding: 2px 7px;
}
#summary-toggle:hover { background: #dbeafe; }

/* ── summary drawer ── */
#summary-drawer {
  flex-shrink: 0;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.25s ease;
}
#summary-drawer.open { max-height: 180px; }
#summary-drawer-inner {
  padding: 12px 20px 14px;
  font-size: 13px;
  color: var(--text-2);
  line-height: 1.65;
  max-height: 180px;
  overflow-y: auto;
}

/* ── main layout ── */
#main {
  flex: 1;
  min-height: 0;
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(460px, 520px);
  gap: 8px;
  padding: 8px; 
  background: #f8fafc;
}

/* ── graph side ── */
#graph-side {
  display: flex;
  flex-direction: column;
  min-height: 0;
  background: #ffffff;
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}

#graph-toolbar {
  flex-shrink: 0;
  height: 38px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 14px;
  gap: 12px;
}

.mode-group {
  display: flex;
  background: var(--bg);
  border: 1px solid var(--border-md);
  border-radius: 5px;
  overflow: hidden;
}
.mode-btn {
  padding: 3px 12px;
  font-size: 11px;
  font-family: var(--sans);
  font-weight: 500;
  color: var(--text-2);
  background: transparent;
  border: none;
  cursor: pointer;
  transition: all 0.15s;
}
.mode-btn.active { background: var(--accent); color: #fff; }
.mode-btn:not(.active):hover { background: var(--border); }

.legend {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: nowrap;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  color: var(--text-3);
  white-space: nowrap;
  font-family: var(--mono);
}
.ldot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

/* ── selected strip ── */
#selected-strip {
  flex-shrink: 0;
  min-height: 28px;
  max-height: 56px;
  overflow-y: auto;
  background: var(--accent-bg);
  border-bottom: 1px solid #bfdbfe;
  padding: 5px 14px;
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}

.search-group {
  flex: 1;              
  display: flex;
  align-items: center;
  gap: 8px;
  background: #f8fafc;
  padding: 4px;
  border-radius: 10px;
  border: 1px solid var(--border);
}

.sel-chip {
  background: #fff;
  border: 1px solid #bfdbfe;
  border-radius: 99px;
  padding: 1px 8px;
  font-size: 10px;
  color: var(--accent);
  font-family: var(--mono);
  white-space: nowrap;
  max-width: 180px;
  overflow: hidden;
  text-overflow: ellipsis;
}
#sel-hint {
  font-size: 11px;
  color: var(--text-3);
  font-family: var(--mono);
}

#graph {
  flex: 1;
  min-height: 0;
  height: 100%;
  position: relative;
  background: var(--bg);
}

/* ── QA side ── */
#qa-side {
  display: flex;
  flex-direction: column;
  min-height: 0;
  background: #f8fafc; 
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 2px 6px rgba(0,0,0,0.04);
}

#details-panel {
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
  padding: 12px 14px;
  min-height: 60px;
  max-height: 110px;
  overflow-y: auto;
  background: #f1f5f9; 
  border-left: 3px solid #2563eb;
  color: #0f172a;
}
.details-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.4;
  margin-bottom: 4px;
}
.details-meta {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-3);
}

#qa-inner {
  flex: 1;
  overflow-y: auto;
  padding: 18px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.qa-section-label {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 5px;
}

.sel-actions { display: flex; gap: 6px; }
.sel-btn {
  flex: 1;
  height: 28px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  font-family: var(--sans);
  border: 1px solid var(--border-md);
  transition: all 0.15s;
}
.sel-btn-all { background: var(--accent-bg); color: var(--accent); border-color: #bfdbfe; }
.sel-btn-all:hover { background: #dbeafe; }
.sel-btn-clear { background: var(--bg); color: var(--text-2); }
.sel-btn-clear:hover { background: var(--border); }

#question {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border-md);
  color: var(--text);
  padding: 9px 11px;
  border-radius: 6px;
  font-size: 13px;
  font-family: var(--sans);
  resize: none;
  outline: none;
  line-height: 1.5;
  transition: border-color 0.15s;
}
#question:focus { border-color: var(--accent); background: var(--surface); }
#question::placeholder { color: var(--text-3); }

#ask-btn {
  width: 100%;
  height: 36px;

  background: #e6f9ef;      
  color: #166534;            
  border: 1px solid #86efac;  

  border-radius: 6px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;

  transition: all 0.15s ease;
}

#ask-btn:hover:not(:disabled) {background: #d1fae5;   border-color: #4ade80; }
#ask-btn:active {background: #bbf7d0;}
#ask-btn:disabled { background: var(--bg); color: var(--text-3); border-color: var(--border); cursor: not-allowed; }

#answer {
  font-size: 12.5px;
  color: var(--text-2);
  line-height: 1.7;
}
#answer strong { color: var(--text); }
#answer p { margin-bottom: 7px; }
#answer ul { padding-left: 15px; margin-bottom: 7px; }
#answer li { margin-bottom: 3px; }
#answer hr { border: none; border-top: 1px solid var(--border); margin: 10px 0; }
#answer details summary {
  cursor: pointer;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--accent);
  letter-spacing: 0.05em;
  margin-top: 6px;
}
#answer details > div {
  margin-top: 8px;
  padding: 10px;
  background: var(--bg);
  border-radius: 5px;
  border: 1px solid var(--border);
  max-height: 220px;
  overflow-y: auto;
  font-size: 11px;
  color: var(--text-2);
}
.chunk-label {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--text-3);
  margin-bottom: 3px;
  letter-spacing: 0.06em;
}
.chunk-item { margin-bottom: 9px; padding-bottom: 9px; border-bottom: 1px solid var(--border); }
.chunk-item:last-child { border-bottom: none; margin-bottom: 0; }

/* graph labels */
.node-label { font-family: var(--sans) !important; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div id="logo">Citation <em>Atlas</em></div>
    <div class="search-group">
      <input id="topic" placeholder="Enter a research topic — e.g. diffusion models for video generation">
      <button id="run-btn">Run</button>
    </div>
  <div id="status"></div>
</div>

<!-- SUB BAR -->
<div id="subbar">
  <div class="subbar-cell">
    <span class="subbar-label">Run</span>
    <select id="runs" onchange="loadRun()"></select>
  </div>
  <div id="summary-cell" class="subbar-cell" style="border-right:none">
    <span class="subbar-label" style="white-space:nowrap">Summary</span>
    <div id="summary-content">Select a run</div>
    <button id="summary-toggle" onclick="toggleSummary()">expand</button>
  </div>
</div>

<!-- SUMMARY DRAWER -->
<div id="summary-drawer">
  <div id="summary-drawer-inner"></div>
</div>

<!-- MAIN -->
<div id="main">

  <!-- GRAPH -->
  <div id="graph-side">

    <div id="graph-toolbar">
      <div style="display:flex;align-items:center;gap:10px">
        <span class="subbar-label">Size by</span>
        <div class="mode-group">
          <button id="mode-citations" class="mode-btn active" onclick="setNodeSizeMode('citations')">Citations</button>
          <button id="mode-relevance" class="mode-btn" onclick="setNodeSizeMode('relevance')">Relevance</button>
        </div>
      </div>
      <div class="legend">
        <div class="legend-item"><span class="ldot" style="background:#1e3a8a"></span>landmark</div>
        <div class="legend-item"><span class="ldot" style="background:#2563eb"></span>important</div>
        <div class="legend-item"><span class="ldot" style="background:#60a5fa"></span>bridge</div>
        <div class="legend-item"><span class="ldot" style="background:#f97316"></span>recent</div>
        <div class="legend-item"><span class="ldot" style="background:#9ca3af"></span>peripheral</div>
        <div class="legend-item"><span class="ldot" style="background:#fff;border:2px solid #06b6d4"></span>selected</div>
        <div class="legend-item"><span style="color:#ca8a04;font-size:11px">●</span>&nbsp;source</div>
      </div>
    </div>

    <div id="selected-strip">
      <span id="sel-hint" style="font-size:11px;color:var(--text-3);font-family:var(--mono)">
        Click nodes to select · shift+click for multi · selected papers will be queried
      </span>
    </div>

    <div id="graph"></div>

  </div>

  <!-- QA -->
  <div id="qa-side">

    <div id="details-panel">
      <span style="font-size:12px;color:var(--text-3);font-family:var(--mono)">Hover or click a node to see details</span>
    </div>

    <div id="qa-inner">

      <div>
        <div class="qa-section-label">Selection</div>
        <div class="sel-actions">
          <button class="sel-btn sel-btn-all" onclick="selectAllNodes()">Select all</button>
          <button class="sel-btn sel-btn-clear" onclick="clearNodeSelection()">Clear</button>
        </div>
      </div>

      <div>
        <div class="qa-section-label">Question</div>
        <textarea id="question" rows="4" placeholder="Ask anything about the selected papers…"></textarea>
      </div>

      <button id="ask-btn" onclick="askPaper()">Ask</button>

      <div id="answer"></div>

    </div>
  </div>

</div>


<script src="/frontend/graph.js"></script>
<script>

let summaryOpen = false;
let fullSummary = "";

function toggleSummary() {
  summaryOpen = !summaryOpen;
  const drawer = document.getElementById("summary-drawer");
  const btn    = document.getElementById("summary-toggle");
  drawer.classList.toggle("open", summaryOpen);
  btn.textContent = summaryOpen ? "collapse" : "expand";
}

async function loadSummary(runId) {
  try {
    const res  = await fetch("/summary?run_id=" + runId);
    const data = await res.json();
    fullSummary = data.summary || "";
    const short = document.getElementById("summary-content");
    const full  = document.getElementById("summary-drawer-inner");
    if (!fullSummary) {
      short.textContent = "No summary available";
      full.innerHTML    = "<i>No summary available</i>";
    } else {
      short.textContent = fullSummary.slice(0, 120) + (fullSummary.length > 120 ? "…" : "");
      full.innerHTML    = marked.parse(fullSummary);
    }
  } catch(e) {
    document.getElementById("summary-content").textContent = "Summary unavailable";
  }
}

async function start() {
  const topic = document.getElementById("topic").value.trim();
  if (!topic) return;
  const btn      = document.getElementById("run-btn");
  const statusEl = document.getElementById("status");
  btn.disabled   = true;
  btn.textContent = "Running…";

  statusEl.style.display = "inline-block";
  statusEl.textContent = "Starting…";
  try {
    await fetch("/run_pipeline?topic=" + encodeURIComponent(topic), { method: "POST" });
    waitForCompletion(btn);
  } catch(e) {
    statusEl.style.display = "inline-block";
    statusEl.textContent = "Failed to start";
    btn.disabled = false;
    btn.textContent = "Run";
  }
}

async function waitForCompletion(btn) {
  const statusEl = document.getElementById("status");
  const interval = setInterval(async () => {
    try {
      const r    = await fetch("/status");
      const data = await r.json();
      statusEl.style.display = "inline-block";
      statusEl.innerHTML = `<span style="opacity:1">${data.message}</span>`;
    
      if (data.step === "complete") {
        clearInterval(interval);
        statusEl.innerHTML = '<span style="color:#16a34a">✓ Graph ready</span>';

        // Don't hide the completion message - let it persist
        // setTimeout(() => {
        //   statusEl.style.display = "none";
        // }, 3000);

        btn.disabled = false;
        btn.textContent = "Run";

        await new Promise(r => setTimeout(r, 300));
        await loadRuns();

        const sel = document.getElementById("runs");
        if (sel?.options.length > 0) sel.selectedIndex = sel.options.length - 1;

        await loadRun();
        // Small delay to ensure files are written
        await new Promise(r => setTimeout(r, 500));
      }
      
      if (data.step === "error") {
        clearInterval(interval);
        statusEl.style.display = "inline-block";
        statusEl.innerHTML = `<span style="color:#dc2626">✗ ${data.message}</span>`;
        // Don't hide error messages - let them persist
        // setTimeout(() => {
        //   statusEl.style.display = "none";
        // }, 3000);
        btn.disabled = false;
        btn.textContent = "Run";
      }
    } catch(e) {
      clearInterval(interval);
      statusEl.style.display = "inline-block";
      statusEl.textContent = "Status error";
      btn.disabled = false;
      btn.textContent = "Run";
    }
  }, 1000);
}

async function askPaper() {
  const btn      = document.getElementById("ask-btn");
  const answerEl = document.getElementById("answer");
  const question = document.getElementById("question").value.trim();
  if (!question) { answerEl.innerHTML = '<span style="color:#dc2626">Enter a question</span>'; return; }
  const selected = Array.from(window.selectedNodes || []);
  btn.disabled    = true;
  btn.textContent = "Thinking…";
  answerEl.innerHTML = '<span style="color:var(--text-3)">Searching chunks…</span>';
  try {
    const res  = await fetch("/ask", {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify({ question, paper_ids: selected })
    });
    const data = await res.json();
    if (data.error) {
      answerEl.innerHTML = `<span style="color:#dc2626">${data.error}</span>`;
    } else {
      let html = marked.parse(data.answer || "");
      html += `<hr>`;
      if (data.chunks_used !== undefined) {
        html += `<span style="font-family:var(--mono);font-size:10px;color:var(--text-3)">CHUNKS USED: ${data.chunks_used}</span>`;
      }
      if (data.chunks?.length) {
        html += `<details><summary>VIEW SOURCE CHUNKS</summary><div>
          ${data.chunks.map((c, i) => `
            <div class="chunk-item">
              <div class="chunk-label">CHUNK ${i + 1}</div>
              <div>${c}</div>
            </div>`).join("")}
        </div></details>`;
      }
      answerEl.innerHTML = html;
      if (data.source_papers) highlightNodes(data.source_papers);
    }
  } catch(e) {
    answerEl.innerHTML = '<span style="color:#dc2626">Request failed</span>';
  }
  btn.disabled = false;
  btn.textContent = "Ask";
}

async function loadRuns() {
  const res  = await fetch("/runs");
  const runs = await res.json();
  const sel  = document.getElementById("runs");
  sel.innerHTML = "";
  if (!runs?.length) return;
  runs.forEach(r => {
    const o = document.createElement("option");
    o.value = r.id;
    o.textContent = r.label;
    sel.appendChild(o);
  });
}

async function loadRun() {
  const run = document.getElementById("runs").value;
  if (!run) return;
  await fetch("/load_run?run_id=" + run, { method: "POST" });
  await loadSummary(run);
  renderGraph();
}

async function init() {
  await loadRuns();
  const sel = document.getElementById("runs");
  if (sel?.options.length > 0) sel.selectedIndex = sel.options.length - 1;
  await loadRun();
}
init();
document.getElementById("run-btn").addEventListener("click", start);

</script>
</body>
</html>
